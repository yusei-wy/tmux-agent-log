[tools]
go = "1.26.2"
golangci-lint = "2.12.1"
gofumpt = "0.9.2"
lefthook = "2.1.6"
"go:golang.org/x/tools/cmd/goimports" = "latest"

[tasks.fmt]
description = "Format all Go files"
run = """
gofumpt -w .
goimports -w -local github.com/yusei-wy/tmux-agent-log .
"""

[tasks."fmt:files"]
description = "Format specified Go files (used by hooks)"
usage = 'arg "<files>" var=#true'
run = '''
{% raw %}
eval "files=($usage_files)"
[ ${#files[@]} -eq 0 ] && exit 0
gofumpt -w "${files[@]}"
goimports -w -local github.com/yusei-wy/tmux-agent-log "${files[@]}"
{% endraw %}
'''

[tasks."lint:build"]
description = "Build custom golangci-lint with cuddlevar"
run = "golangci-lint custom --destination tools/bin --name custom-gcl"

[tasks.lint]
description = "Run golangci-lint (custom build with cuddlevar)"
run = "tools/bin/custom-gcl run"

[tasks."lint:fix"]
description = "Run golangci-lint --fix (custom build with cuddlevar)"
run = "tools/bin/custom-gcl run --fix"

[tasks.test]
description = "Run all tests"
run = "go test ./..."

[tasks.check]
description = "Run fmt, lint, test"
depends = ["fmt", "lint", "test"]
