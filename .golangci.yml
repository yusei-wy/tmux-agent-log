version: "2"

run:
  timeout: 3m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - copyloopvar
    - errorlint
    - gocheckcompilerdirectives
    - gocritic
    - gosec
    - intrange
    - misspell
    - prealloc
    - revive
    - nlreturn
    - unconvert
    - unparam
    - whitespace
    - wsl_v5
    - cuddlevar
  settings:
    staticcheck:
      checks:
        - "all"
        - "-ST1000" # package doc — revive package-comments: disabled と整合
    revive:
      rules:
        - name: var-naming
        - name: package-comments
          disabled: true
        - name: exported
          disabled: true
    gocritic:
      disabled-checks:
        - ifElseChain
    gosec:
      excludes:
        - G104
    nlreturn:
      block-size: 2
    wsl_v5:
      allow-whole-block: true
      cuddle-max-statements: 1
    custom:
      cuddlevar:
        type: module
  exclusions:
    rules:
      - path: _test\.go
        linters:
          - gosec
          - errcheck
          - unparam
      # 信頼境界: adapter 層は外部リソース (file system / git / tmux) を呼ぶのが
      # 設計上の責務。G204 (subprocess) と G304 (file inclusion) は構造的に
      # false positive となるため、この層に限ってルールごと除外する。
      - path: internal/(storage|git|tmux)/
        linters:
          - gosec

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/yusei-wy/tmux-agent-log

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
